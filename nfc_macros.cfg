# NFC Spoolman — Klipper macros for multi-tool spool assignment
#
# Include this file in your printer.cfg:
#   [include nfc_macros.cfg]
#
# These macros are used by the NFC daemon in multi_tool mode.
# When a spool is scanned, the daemon stores the spool details in
# _NFC_STATE variables and shows an action:prompt dialog.  The user
# picks a tool on the KlipperScreen prompt, which calls NFC_ASSIGN_TOOL.
#
# Requires:
#   - [respond] section in printer.cfg (for action:prompt)
#   - [save_variables] section in printer.cfg (optional, for per-tool variables)
#   - Moonraker spoolman component with per-tool support
#     (spoolman_set_active_spool remote method accepting tool parameter)

[gcode_macro _NFC_STATE]
description: Holds pending NFC scan data — written by the NFC daemon, read by NFC_ASSIGN_TOOL
variable_pending_spool_id: 0
variable_pending_material: ""
variable_pending_vendor: ""
variable_pending_name: ""
variable_pending_color: ""
variable_pending_extruder_temp: 0
variable_pending_bed_temp: 0
variable_pending_diameter: 1.75
gcode:
    ; Display current pending spool info
    {% set state = printer["gcode_macro _NFC_STATE"] %}
    {% if state.pending_spool_id > 0 %}
        RESPOND MSG="Pending NFC spool: #{state.pending_spool_id} — {state.pending_vendor} {state.pending_material} {state.pending_name}"
    {% else %}
        RESPOND MSG="No pending NFC spool"
    {% endif %}

[gcode_macro NFC_ASSIGN_TOOL]
description: Assign the pending NFC spool to a tool — called by the action:prompt dialog
gcode:
    {% set tool = params.TOOL|default(0)|int %}
    {% set state = printer["gcode_macro _NFC_STATE"] %}
    {% set spool_id = state.pending_spool_id|int %}

    {% if spool_id == 0 %}
        RESPOND TYPE=error MSG="No pending NFC spool to assign"
        RESPOND TYPE=command MSG="action:prompt_end"
    {% else %}
        ; Close the prompt
        RESPOND TYPE=command MSG="action:prompt_end"

        ; Set the active spool for this tool in Moonraker/Spoolman
        {action_call_remote_method("spoolman_set_active_spool",
                                   spool_id=spool_id, tool=tool)}

        ; Save per-tool variables for use in macros (e.g. PRINT_START)
        ; Requires [save_variables] — if not configured these lines will error,
        ; remove them or add [save_variables] to printer.cfg.
        {% if printer.save_variables is defined %}
            SAVE_VARIABLE VARIABLE=nfc_t{tool}_spool_id VALUE={spool_id}
            SAVE_VARIABLE VARIABLE=nfc_t{tool}_material VALUE='"{state.pending_material}"'
            SAVE_VARIABLE VARIABLE=nfc_t{tool}_extruder_temp VALUE={state.pending_extruder_temp}
            SAVE_VARIABLE VARIABLE=nfc_t{tool}_bed_temp VALUE={state.pending_bed_temp}
            SAVE_VARIABLE VARIABLE=nfc_t{tool}_vendor VALUE='"{state.pending_vendor}"'
            SAVE_VARIABLE VARIABLE=nfc_t{tool}_name VALUE='"{state.pending_name}"'
            SAVE_VARIABLE VARIABLE=nfc_t{tool}_color VALUE='"{state.pending_color}"'
        {% endif %}

        ; Clear pending state
        SET_GCODE_VARIABLE MACRO=_NFC_STATE VARIABLE=pending_spool_id VALUE=0

        ; User feedback
        RESPOND MSG="Spool #{spool_id} ({state.pending_vendor} {state.pending_material}) assigned to T{tool}"
    {% endif %}

[gcode_macro NFC_CANCEL]
description: Dismiss the NFC tool-selection prompt without assigning
gcode:
    RESPOND TYPE=command MSG="action:prompt_end"
    SET_GCODE_VARIABLE MACRO=_NFC_STATE VARIABLE=pending_spool_id VALUE=0
    RESPOND MSG="NFC spool assignment cancelled"

[gcode_macro NFC_STATUS]
description: Show current per-tool spool assignments from saved variables
gcode:
    {% set svv = printer.save_variables.variables if printer.save_variables is defined else {} %}
    {% set state = printer["gcode_macro _NFC_STATE"] %}
    {% if state.pending_spool_id > 0 %}
        RESPOND MSG="Pending: #{state.pending_spool_id} — {state.pending_vendor} {state.pending_material}"
    {% endif %}
    {% for t in range(10) %}
        {% set key = "nfc_t" ~ t ~ "_spool_id" %}
        {% if svv[key] is defined and svv[key] %}
            {% set mat = svv["nfc_t" ~ t ~ "_material"]|default("?") %}
            {% set vendor = svv["nfc_t" ~ t ~ "_vendor"]|default("?") %}
            RESPOND MSG="T{t}: Spool #{svv[key]} — {vendor} {mat}"
        {% endif %}
    {% endfor %}
